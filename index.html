<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKZOO Pet 🐾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .scene-bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;}
    .scene-bg img{width:100%;height:100%;object-fit:cover;display:block;}
    .scene-overlay{position:fixed;inset:0;z-index:0;background:rgba(0,0,0,0.45);pointer-events:none;opacity:0;transition:opacity .8s;}
    .casing-wrapper{position:relative;z-index:2;}
    .casing-image{position:absolute;inset:-12px;background-size:contain;background-position:center;background-repeat:no-repeat;pointer-events:none;z-index:10;}
    .toolbar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;position:relative;z-index:5;margin-bottom:4px;}
    .toolbar-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 12px;font-size:10px;color:rgba(142,207,142,.7);font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:.5px;cursor:pointer;transition:all .18s;white-space:nowrap;}
    .toolbar-btn:hover,.toolbar-btn.on{background:rgba(100,200,100,.12);border-color:rgba(100,200,100,.3);color:#8ecf8e;}
    #CASING_INPUT,#SCENE_INPUT{display:none;}
    #TRIVIA_OVERLAY{display:none;position:absolute;inset:0;background:rgba(10,14,10,.94);z-index:22;flex-direction:column;align-items:stretch;padding:10px;gap:5px;border-radius:14px;}
    .trivia-progress{font-size:8px;color:#3a5c3a;letter-spacing:1px;text-transform:uppercase;font-weight:800;text-align:right;}
    .trivia-question{font-size:11px;color:#8ecf8e;font-weight:800;line-height:1.4;text-align:center;padding:4px 2px;}
    .trivia-answers{display:flex;flex-direction:column;gap:4px;flex:1;}
    .trivia-answer{display:flex;align-items:center;gap:6px;padding:5px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(142,207,142,.12);border-radius:7px;}
    .trivia-letter{font-size:9px;font-weight:900;color:#3a5c3a;width:14px;flex-shrink:0;}
    .trivia-text{font-size:10px;color:rgba(142,207,142,.8);font-weight:700;line-height:1.3;}
    .trivia-correct{background:rgba(91,186,110,.2)!important;border-color:#5dba6e!important;}
    .trivia-correct .trivia-letter,.trivia-correct .trivia-text{color:#5dba6e!important;}
    .trivia-wrong{background:rgba(232,76,106,.15)!important;border-color:#e84c6a!important;}
    .trivia-wrong .trivia-letter,.trivia-wrong .trivia-text{color:#e84c6a!important;}
    .trivia-reveal{background:rgba(245,200,66,.15)!important;border-color:#f5c842!important;}
    .trivia-reveal .trivia-letter,.trivia-reveal .trivia-text{color:#f5c842!important;}
    .trivia-score-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;text-align:center;}
    .trivia-score-num{font-size:34px;font-weight:900;color:#8ecf8e;}
    .trivia-score-pct{font-size:13px;color:#3a5c3a;font-weight:800;}
    .trivia-score-label{font-size:11px;color:rgba(142,207,142,.8);font-weight:700;line-height:1.5;}
    .trivia-score-close{margin-top:8px;background:rgba(142,207,142,.1);border:1px solid rgba(142,207,142,.25);border-radius:20px;padding:6px 16px;font-size:10px;color:#8ecf8e;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;}
    #TRIVIA_BTNS{display:none;flex-direction:column;gap:6px;width:100%;}
    #NORMAL_BTNS{display:block;width:100%;}
    /* Hide open eyes when sleeping — eyelids cover but whites still show */
    .eyes-closed .eyelid-l, .eyes-closed .eyelid-r{animation:none!important;transform:scaleY(1)!important;}
    .eyes-closed .eye-white-l, .eyes-closed .eye-iris-l,
    .eyes-closed .eye-white-r, .eyes-closed .eye-iris-r{opacity:0!important;}
    .trivia-btn-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .trivia-answer-btn{background:linear-gradient(150deg,#1e1d38,#12112a);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;gap:1px;transition:all .15s cubic-bezier(.34,1.56,.64,1);min-height:46px;}
    .trivia-answer-btn:hover{background:linear-gradient(150deg,#2a2950,#1a184a);transform:scale(1.02);}
    .trivia-answer-btn:active{transform:scale(.96);}
    .trivia-btn-letter{font-size:9px;font-weight:900;color:rgba(142,207,142,.4);letter-spacing:1px;}
    .trivia-btn-text{font-size:10px;font-weight:700;color:rgba(142,207,142,.75);line-height:1.2;text-align:left;}
    .trivia-btn-correct{border-color:#5dba6e!important;background:rgba(91,186,110,.15)!important;}
    .trivia-btn-wrong{border-color:#e84c6a!important;background:rgba(232,76,106,.1)!important;}
    .trivia-btn-reveal{border-color:#f5c842!important;background:rgba(245,200,66,.1)!important;}
    .trivia-skip-row{display:flex;justify-content:space-between;align-items:center;}
    .trivia-quit-btn,.trivia-skip-btn-ctrl{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:5px 14px;font-size:10px;font-weight:800;letter-spacing:.5px;color:rgba(142,207,142,.4);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .18s;}
    .trivia-quit-btn:hover{color:#e84c6a;border-color:rgba(232,76,106,.3);}
    .trivia-skip-btn-ctrl:hover{color:#8ecf8e;border-color:rgba(142,207,142,.3);}
  </style>
</head>

<script>
const Scene=(()=>{
  const BUILT_IN=[null,'assets/img/scene1.png','assets/img/scene2.png','assets/img/scene3.png','assets/img/scene4.png','assets/img/scene1.gif','assets/img/scene2.gif','assets/img/scene3.gif','assets/img/scene4.gif'];
  let idx=0,custom=null;
  function set(v){
    const bg=document.getElementById('SCENE_BG'),ov=document.getElementById('SCENE_OVERLAY');
    if(v===0||v==='none'){bg.innerHTML='';bg.style.backgroundImage='none';ov.style.opacity='0';idx=0;custom=null;save();return;}
    const url=typeof v==='string'&&v.startsWith('data:')?v:BUILT_IN[v];
    if(!url)return;
    bg.innerHTML='';bg.style.backgroundImage='none';
    const img=document.createElement('img');img.src=url;img.onerror=()=>{bg.innerHTML='';};bg.appendChild(img);
    ov.style.opacity='1';save();
  }
  function cycle(){idx=(idx+1)%BUILT_IN.length;set(idx===0?0:idx);}
  function upload(){document.getElementById('SCENE_INPUT').click();}
  function onFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{custom=ev.target.result;set(custom);};r.readAsDataURL(f);e.target.value='';}
  function save(){try{localStorage.setItem('skzoo-scene-idx',idx);if(custom)localStorage.setItem('skzoo-scene-custom',custom);else localStorage.removeItem('skzoo-scene-custom');}catch(e){}}
  function load(){try{const c=localStorage.getItem('skzoo-scene-custom');if(c){custom=c;set(custom);return;}const i=parseInt(localStorage.getItem('skzoo-scene-idx')||'0');if(i>0)set(i);}catch(e){}}
  return{set,cycle,upload,onFile,load};
})();

const Casing=(()=>{
  function upload(){document.getElementById('CASING_INPUT').click();}
  function onFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{apply(ev.target.result);try{localStorage.setItem('skzoo-casing',ev.target.result);}catch(e){}};r.readAsDataURL(f);e.target.value='';}
  function apply(url){const el=document.getElementById('CASING_IMG'),btn=document.getElementById('CASING_CLEAR');if(el)el.style.backgroundImage=`url('${url}')`;if(btn)btn.style.display='inline-block';}
  function clear(){const el=document.getElementById('CASING_IMG'),btn=document.getElementById('CASING_CLEAR');if(el)el.style.backgroundImage='none';if(btn)btn.style.display='none';try{localStorage.removeItem('skzoo-casing');}catch(e){}}
  function load(){try{const s=localStorage.getItem('skzoo-casing');if(s)apply(s);}catch(e){}}
  return{upload,onFile,apply,clear,load};
})();

Health.init();Wolf.init();Player.init();Trivia.init();Scene.load();Casing.load();
</script>
